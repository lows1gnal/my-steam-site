
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Indie Steam Store</title>
    <style>
        body { background-color: #1b2838; color: #c7d5e0; font-family: sans-serif; margin: 0; padding: 20px; }
        header { background-color: #171a21; padding: 20px; margin-bottom: 20px; border-bottom: 3px solid #101216; }
        h1 { color: #fff; margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .store-container { max-width: 800px; margin: 0 auto; }
        .game-card { background: #16202d; border: 1px solid #233c51; padding: 20px; border-radius: 4px; display: flex; gap: 20px; }
        .game-info { flex: 1; }
        .game-title { color: #66c0f4; font-size: 20px; margin-top: 0; }
        .download-btn { background: linear-gradient( to right, #75b022 0%, #588a1b 100%); color: #fff; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 2px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 15px; }
        .download-btn:hover { background: #75b022; }
    </style>
</head>
<body>
    <header>
        <h1>🎮 MY INDIE STORE</h1>
    </header>
    <div class="store-container">
        <div class="game-card">
            <div class="game-info">
                <h2 class="game-title">Super Cool Game v1.0</h2>
                <p>Welcome to my game storefront! This is a completely free, Steam-styled website hosted on GitHub Pages.</p>
                <!-- REPLACE THE LINK BELOW WITH YOUR GOOGLE DRIVE / MEGA DOWNLOAD LINK -->
                <a href="https://google.com" target="_blank" class="download-btn">DOWNLOAD GAME</a>
            </div>
        </div>
    </div>
</body>
</html>
