<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luco Game Launcher</title>
    <style>
        :root {
            --bg-base: #0b0914;
            --bg-sidebar: #130f26;
            --bg-panel: #1b1635;
            --accent-purple: #7a52f4;
            --accent-hover: #9674ff;
            --text-main: #f1f0f5;
            --text-muted: #8b86a3;
            --green-gradient: linear-gradient(135deg, #75b022 0%, #588a1b 100%);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR PANEL */
        aside {
            width: 240px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 15px;
            border-right: 1px solid #231d42;
            box-sizing: border-box;
        }

        .brand-header h1 {
            font-size: 26px;
            margin: 0 0 5px 0;
            color: #fff;
            letter-spacing: 1px;
        }
        .brand-header span {
            font-size: 11px;
            color: var(--text-muted);
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 30px;
            flex-grow: 1;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-btn:hover, .nav-btn.active {
            background-color: var(--bg-panel);
            color: #fff;
        }
        .nav-btn.active {
            border-left: 4px solid var(--accent-purple);
        }

        .user-panel {
            background-color: var(--bg-panel);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
        }
        .user-tag {
            font-weight: bold;
            color: var(--accent-hover);
        }

        /* DISPLAY VIEWPORT FRAME */
        main {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .view-section {
            display: none;
        }
        .view-section.active {
            display: block;
        }

        h2 { font-size: 28px; margin-top: 0; }
        .sub-header { color: var(--text-muted); margin-bottom: 25px; }

        /* UNIFORM CONTROL COMPONENT FIELDS */
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-width: 450px;
        }
        label { font-size: 13px; color: var(--text-muted); }
        input, textarea, select {
            background-color: var(--bg-panel);
            border: 1px solid #332b5c;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            outline: none;
        }
        .checkbox-group {
            flex-direction: row;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        .action-btn {
            background-color: var(--accent-purple);
            color: #fff;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            max-width: max-content;
        }
        .action-btn:hover { background-color: var(--accent-hover); }

        /* ITEM RENDERING TILES */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .game-card {
            background-color: var(--bg-panel);
            border: 1px solid #2a2254;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .game-thumb {
            width: 100%;
            height: 260px;
            background-color: #120e24;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
        }
        .badge.free { background-color: #00b060; }
        .badge.paid { background-color: var(--accent-purple); }
        .badge.cs { background-color: #e67e22; }

        .game-details {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
            justify-content: space-between;
        }
        .game-title { font-size: 16px; font-weight: bold; margin: 0; }
        
        .buy-btn, .dl-link-btn {
            background: var(--green-gradient);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 8px;
            font-size: 13px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: block;
        }
        .delete-btn {
            background: #c0392b;
            color: white;
            margin-top: 5px;
            padding: 4px;
            font-size: 11px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .empty-notice {
            color: var(--text-muted);
            font-style: italic;
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>

    <!-- NAVIGATION BAR LAYER -->
    <aside>
        <div>
            <div class="brand-header">
                <h1>Luco</h1>
                <span>Next-Gen Indie Client</span>
            </div>
            <nav id="sidebarNavigation">
                <button class="nav-btn active" data-target="store">Store</button>
                <button class="nav-btn" data-target="library">My Library</button>
                <button class="nav-btn" data-target="publish">Publish Game</button>
                <button class="nav-btn" data-target="auth">Account Settings</button>
            </nav>
        </div>
        
            Not logged in
        </div>
    </aside>

    <!-- CONTENT MODULE RENDERS -->
    <main>
        <!-- STORE PANEL -->
        <div id="storeView" class="view-section active">
            <h2>Store</h2>
            <div class="sub-header">Discover your next adventure</div>
            <div class="games-grid" id="storeGrid"></div>
        </div>

        <!-- INVENTORY SYSTEM -->
        <div id="libraryView" class="view-section">
            <h2>My Library</h2>
            <div class="sub-header">Your personal instant inventory</div>
            <div class="games-grid" id="libraryGrid"></div>
        </div>

        <!-- SUBMISSION MANAGEMENT UNIT -->
        <div id="publishView" class="view-section">
            <h2>Publish Project</h2>
            <div class="sub-header">List your creative build global platform entirely free</div>
            <div>
                <div class="form-group">
                    <label>Game Title *</label>
                    <input type="text" id="pubTitle" placeholder="e.g. Neon Shadows">
                </div>
                <div class="form-group">
                    <label>Pricing Class</label>
                    <select id="pubPrice">
                        <option value="Free">Free</option>
                        <option value="Paid">Paid ($19.99)</option>
                    </select>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="pubComingSoon">
                    <label for="pubComingSoon">Mark project configuration as 'Coming Soon'</label>
                </div>
                <div id="fileUploadRequirements">
                    <div class="form-group">
                        <label>Capsule Image Link URL *</label>
                        <input type="text" id="pubImage" placeholder="https://example.com">
                    </div>
                    <div class="form-group">
                        <label>Game File Archive Download Link (.zip) *</label>
                        <input type="text" id="pubFile" placeholder="https://google.com">
                    </div>
                </div>
                <button class="action-btn" id="submitPublishBtn">Publish to Client</button>
            </div>
        </div>

        <!-- SYSTEM ACCESS ACCOUNT SETUP -->
        <div id="authView" class="view-section">
            <h2>Account Access</h2>
            <div class="sub-header">Create an identity instance to manage transactions</div>
            <div>
                <div class="form-group">
                    <label>Unique User Handle</label>
                    <input type="text" id="authUsername" placeholder="Enter name...">
                </div>
                <button class="action-btn" id="submitAuthBtn">Register Profile</button>
            </div>
        </div>
    </main>

    <script>

        let activeUser = JSON.parse(localStorage.getItem('luco_user') || 'null');
